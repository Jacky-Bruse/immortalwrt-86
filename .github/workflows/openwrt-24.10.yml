name: Build OpenWrt 24.10

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
#   watch:
#     types: started
    
  #schedule:
     #- cron: 00 22 * * *
    
  
env:
  REPO_URL: --single-branch --filter=blob:none https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .diffconfig
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CLASH_BINARY_PLATFORM: x86-64

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Calc disk reserve
      id: reserve
      run: |
        # 当前 runner 镜像无独立 /mnt 盘，easimon 的第二个 pv 会落回根盘，
        # 根分区最终剩余 ≈ temp-reserve-mb（root-reserve-mb 会被第二个 pv 吃掉）
        total=$(df -BM --output=size / | tail -1 | tr -dc '0-9')
        if [ "$total" -ge 100000 ]; then temp=8192; else temp=6144; fi
        root=$((temp + 2048))
        echo "temp_mb=$temp" >> $GITHUB_OUTPUT
        echo "root_mb=$root" >> $GITHUB_OUTPUT
        echo "root_total=${total}MB temp_reserve=${temp}MB root_reserve=${root}MB"

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: ${{ steps.reserve.outputs.root_mb }}
        temp-reserve-mb: ${{ steps.reserve.outputs.temp_mb }}
        swap-size-mb: 2048
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'
        build-mount-path: '/workdir'
        
    - name: Relocate runner temp to build volume
      run: |
        sudo mkdir -p /workdir/runner-temp
        sudo cp -a "$RUNNER_TEMP/." /workdir/runner-temp/
        sudo chown -R "$USER" /workdir/runner-temp
        sudo mount --bind /workdir/runner-temp "$RUNNER_TEMP"
        findmnt -T "$RUNNER_TEMP"
        df -hT "$RUNNER_TEMP" /workdir

    - name: Checkout
      uses: actions/checkout@v4 # actions/checkout@main

    - name: Disk space
      run: |
           echo "Free space:"
           df -h

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo dpkg --configure -a || true
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "check essential build tools:"
        for c in gcc g++ make git python3 file rsync wget unzip tar; do command -v $c >/dev/null || { echo "::error::missing build tool: $c"; exit 1; }; done

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
   
    - name: Cache
      uses: stupidloud/cachewrtbuild@b729f807837dbc3455d02fd35192660d9b662121
      with:
       ccache: 'true'
       mixkey: '2410-x86'
       clean:  'false'  # 'false'
       prefix: ${{ github.workspace }}/openwrt

    - name: Restore dl cache
      id: cache-dl
      uses: actions/cache/restore@v6
      with:
        path: /workdir/openwrt/dl
        key: dl-2410-${{ github.run_id }}
        restore-keys: |
          dl-2410-
    
    
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
    
    #- name: luci-theme-argonn
      #run: |
        #cd openwrt/package 		
        #git clone -b 18.06 https://github.com/jerrykuku/luci-theme-argon.git luci-theme-argonn
   
   
    - name: lee
      run: |
        cd openwrt 
        bash  Lee.sh

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        chmod +x $GITHUB_WORKSPACE/scripts/*.sh
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/scripts/preset-clash-core-x86.sh $CLASH_BINARY_PLATFORM

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        echo -e 'CONFIG_DEVEL=y\nCONFIG_CCACHE=y' >> .config #Cache.Speedup
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Check dl cache size
      run: |
        df -hT /workdir
        du -sh /workdir/openwrt/dl

    - name: Save dl cache
      uses: actions/cache/save@v6
      with:
        path: /workdir/openwrt/dl
        key: ${{ steps.cache-dl.outputs.cache-primary-key }}

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(($(nproc)+1)) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin
   
    - name: delete files
      run: |
        cd openwrt 
        bash  rename.sh
    

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=OpenWrt_24.10_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.2
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 20
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Free space for cache saving
      run: |
        rm -rf /workdir/openwrt/build_dir/target-*
        df -hT /workdir "$RUNNER_TEMP"

    - name: Notify Telegram on Build Result
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          MESSAGE="OpenWrt_24.10 构建成功！"
        else
          MESSAGE="⚠ OpenWrt_24.10 构建失败！"
        fi
        TELEGRAM_API="https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"
        curl -s -X POST $TELEGRAM_API -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="$MESSAGE"

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        retain_days: 20
        keep_minimum_runs: 3

  prune-cache:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Keep only latest cache per prefix
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        # build 成功后运行：每类缓存按创建时间只保留最新一份
        for prefix in '2410-x86-cache-openwrt-' 'dl-2410-'; do
          gh cache list --key "$prefix" --sort created_at --order desc --json id --jq '.[1:][].id' \
            | xargs -rn1 gh cache delete || true
        done
        gh cache list
